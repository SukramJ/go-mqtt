# Mosquitto 2.x config for go-mqtt e2e tests.
#
# Three listeners, deliberately isolated via per_listener_settings so
# each exercises exactly one TCPClient code path:
#   1883  plain TCP, anonymous            -> MQTT_E2E_MOSQUITTO
#   8883  TLS (server cert only), anon    -> MQTT_E2E_MOSQUITTO_TLS
#   1884  plain TCP, username/password    -> MQTT_E2E_MOSQUITTO_AUTH
#
# Certs are generated by `make e2e-certs` (see e2e/gencert) into
# e2e/testdata/certs, and the password file is generated by
# `make e2e-up` into e2e/testdata/passwd. This directory is bind
# mounted read-only at /mosquitto/config in the container, so paths
# below are container-side.

per_listener_settings true

listener 1883
allow_anonymous true

listener 8883
allow_anonymous true
cafile /mosquitto/config/certs/ca.pem
certfile /mosquitto/config/certs/server.pem
keyfile /mosquitto/config/certs/server.key

listener 1884
allow_anonymous false
password_file /mosquitto/config/passwd
