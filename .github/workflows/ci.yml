# GitHub Actions CI for go-mqtt.
#
# Jobs: lint (go vet + gofumpt + golangci-lint), test (race detector
# across the OS triplet consumers build on), fuzz-smoke (10s per Fuzz
# target in ./protocol — a cheap regression net between the periodic
# longer `make fuzz` runs), e2e (docker-composed mosquitto + emqx
# brokers exercised by ./e2e). Concurrency cancels stale runs on the
# same ref so a fast-pushing developer isn't billed for outdated
# commits.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go vet
        run: go vet ./...
      - name: gofumpt
        run: |
          go install mvdan.cc/gofumpt@latest
          diff=$(gofumpt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofumpt would rewrite:"
            echo "$diff"
            exit 1
          fi
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run ./...

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go test
        env:
          # Race detector requires CGo; enable just for this step.
          CGO_ENABLED: "1"
        run: go test -race -count=1 -timeout=120s ./...

  fuzz-smoke:
    name: fuzz-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: fuzz smoke (10s per ./protocol Fuzz target)
        run: make fuzz-smoke

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # e2e-up blocks until both brokers report readiness in their logs —
      # a TCP probe against the docker-proxied host ports is meaningless
      # (the proxy accepts before the broker inside listens).
      - name: start e2e brokers (mosquitto + emqx)
        run: make e2e-up
      - name: run e2e tests
        env:
          MQTT_E2E_ALLOW_DOCKER_CONTROL: "1"
        run: make test-e2e
      - name: dump broker logs
        if: always()
        run: |
          echo "== gomqtt-e2e-mosquitto logs =="
          docker logs gomqtt-e2e-mosquitto || true
          echo "== gomqtt-e2e-emqx logs =="
          docker logs gomqtt-e2e-emqx || true
      - name: stop e2e brokers
        if: always()
        run: make e2e-down
