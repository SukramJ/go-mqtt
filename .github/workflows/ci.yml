# GitHub Actions CI for go-mqtt.
#
# Two jobs: lint (go vet + gofumpt + golangci-lint), test (race
# detector across the OS triplet consumers build on). Concurrency
# cancels stale runs on the same ref so a fast-pushing developer isn't
# billed for outdated commits.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go vet
        run: go vet ./...
      - name: gofumpt
        run: |
          go install mvdan.cc/gofumpt@latest
          diff=$(gofumpt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofumpt would rewrite:"
            echo "$diff"
            exit 1
          fi
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run ./...

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go test
        env:
          # Race detector requires CGo; enable just for this step.
          CGO_ENABLED: "1"
        run: go test -race -count=1 -timeout=120s ./...
